<!DOCTYPE html>
<html>
<head>
<title>Pendaftaran</title>

<style>
body {font-family: Arial; margin:0; background:#f4f6fb;}
.container {margin-left:240px; padding:20px;}
.card {background:white; padding:20px; border-radius:10px;}

input, select {
    width:100%;
    padding:10px;
    margin:8px 0;
}
button {
    padding:10px 15px;
    background:#0f2d52;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Pendaftaran Pasien</h2>

<div class="card">
    <label>Nama Pasien</label>
    <input type="text">

    <label>Nomor BPJS / NIK</label>
    <input type="text">

    <label>Poli Tujuan</label>
    <select>
        <option>Poli Jiwa</option>
        <option>Poli Umum</option>
        <option>Poli Bedah</option>
    </select>

    <button>Daftarkan</button>
</div>

</div>

</body>
</html>
